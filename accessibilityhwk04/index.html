<!doctype html>
<html lang="en">
<head>
    <title>Olivia Knestaut | Portfolio</title>
    <meta name="author" content="Olivia Knestaut" />
    <meta name="description" content="Olivia Knestaut, UX/UI Designer & Researcher"/>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="icon" href="../images/icons/OK_Ladybug.png">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="#main-content" class="skip-link">
        Skip to main content
    </a>
    <nav class="navbar navbar-expand-sm navbar-light" aria-label="Site Navigation Bar">
        <a class="navbar-brand" href="">
            <img src="../images/general/oknestaut_logo.svg" class="nav-logo d-inline-block align-top" alt="Logo with a ladybug as the letter O in  OKnestaut">
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <section class="collapse navbar-collapse" id="navbarSupportedContent">
            <div class="mr-auto"></div>
            <ul class="navbar-nav my-2 my-lg-0" aria-label="Primary Navigation Items">
                <li class="nav-item dropdown" aria-label="Portfolio Navigation Link">
                    <a class="nav-link dropdown-toggle" href="" id="navbarDropdown" role="button" data-display="static" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">PORTFOLIO<span class="sr-only">(current)</span></a>
                    <div class="dropdown-menu dropdown-menu-lg" aria-labelledby="navbarDropdown">
                        <a class="dropdown-item" href="" aria-label="Case Studies Navigation Link">CASE STUDIES</a>
                        <a class="dropdown-item" href="" aria-label="Photography Navigation Link">PHOTOGRAPHY</a>
                        <a class="dropdown-item" href="" aria-label="Design and Media Navigation Link">DESIGN &amp; MEDIA</a>
                    </div>
                </li>
                <li class="nav-item active" aria-label="About Navigation Link">
                    <a class="nav-link" href="">ABOUT</a>
                </li>
                <li class="nav-item active" aria-label="Resume Navigation Link">
                    <a class="nav-link" href="">RESUME</a>
                </li>
            </ul>
        </section>
    </nav>

    <header id="main-content" class="container-fluid justify-content-center" aria-label="Header Site Banner">
        <picture>
            <source
            media="(min-width: 576px)"
            srcset="../images/general/upper-absract-full-row.svg">

            <img class="img-fluid abstract-img"
            src="../images/general/upper-abstract-2-rows.svg"
            alt="random colorful absract shapes">
        </picture>
    </header>

    <main aria-label="Contact Form Content">
        <section class="case-studies column container-fluid justify-content-center align-items-center" aria-label="Contact Form Section">
            <h1 class="color-primary-accent" >ACCESSIBLE FORM</h1>
            <form id="contactForm" class="contact-form" action="#" method="post" novalidate>
                <fieldset class="name-row">
                    <legend class="sr-only" aria-label="Name Information">Name Information</legend>
                    <label class="form-field" for="firstname" aria-label="First Name Input Field">
                        First Name <span class="required-indicator" aria-label="required">*</span>
                        <input id="firstname" name="firstname" type="text" required aria-required="true" aria-describedby="firstname-error" />
                        <div id="firstname-error" class="error-message" role="alert" aria-live="assertive"></div>
                    </label>

                    <label class="form-field" for="lastname" aria-label="Last Name Input Field">
                        Last Name <span class="required-indicator" aria-label="required">*</span>
                        <input id="lastname" name="lastname" type="text" required aria-required="true" aria-describedby="lastname-error" />
                        <div id="lastname-error" class="error-message" role="alert" aria-live="assertive"></div>
                    </label>
                </fieldset>

                <label class="form-field" for="email" aria-label="Email Address Input Field">
                    Email Address <span class="required-indicator" aria-label="required">*</span>
                    <input id="email" name="email" type="email" required aria-required="true" aria-describedby="email-error" />
                    <div id="email-error" class="error-message" role="alert" aria-live="assertive"></div>
                </label>

                <label class="form-field" for="message" aria-label="Message / Comments Input Field">
                    Message / Comments <span class="required-indicator" aria-label="required">*</span>
                    <textarea id="message" name="message" rows="6" required aria-required="true" minlength="10" aria-describedby="message-error"></textarea>
                    <div id="message-error" class="error-message" role="alert" aria-live="assertive"></div>
                </label>


                <div class="form-actions">
                    <button type="submit" class="btn decorative-primary-accent submit-btn">
                        <span class="btn-text color-primary-accent">Send Message</span>
                    </button>
                    <div id="formStatus" role="status" aria-live="polite" class="form-status" aria-atomic="true"></div>
                </div>
            </form>
        </section>

        <footer class="container-fluid justify-content-center" aria-label="Footer">
            <picture>
                <source
                media="(min-width: 576px)"
                srcset="../images/general/lower-absract-full-row.svg">
                <img class="img-fluid abstract-img"
                src="../images/general/lower-absract-mobile-row.svg"
                alt="random colorful absract shapes">
            </picture>
            <row class="row align-items-center justify-content-center footer bg-decorative-pink-dark">
                <row class="row align-items-center text-color-light">
                    <img class="icon" src="../images/icons/location_icon.svg" alt="location pin icon">
                    <p>Philadelphia, PA</p>
                </row>
                <a class="row align-items-center text-color-light footer-link" href="">
                    <img class="icon" src="../images/icons/mail_icon.svg" alt="email icon">
                    <span>olivia.knestaut@gmail.com</span>
                </a>
                <a href="" class="row align-items-center text-color-light footer-link">
                    <img class="icon" src="../images/icons/instagram_icon.svg" alt="instagram icon">
                    <span>@ollywhelmed</span>
                </a>
                <a href="" class="row align-items-center text-color-light footer-link">
                    <img class="icon" src="../images/icons/linkedin_icon.svg" alt="linkedin icon">
                    <span>oliviaknestaut</span>
                </a>
                <a href="" class="row align-items-center text-color-light footer-link">
                    <img class="icon" src="../images/icons/github_icon.svg" alt="github icon">
                    <span>OliviaKnestaut</span>
                </a>
            </row>
        </footer>
    </main>

    <script src="js/contact-form.js"></script>

    <!-- Optional JavaScript -->
    <!-- jQuery, Popper.js, Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
